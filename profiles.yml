adobe_analytics_bigquery:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: your-gcp-project-id
      dataset: adobe_analytics_dev
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive
      retries: 1
    
    prod:
      type: bigquery
      method: oauth
      project: your-gcp-project-id
      dataset: adobe_analytics_prod
      threads: 8
      timeout_seconds: 600
      location: US
      priority: batch
      retries: 3
